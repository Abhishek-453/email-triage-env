name: email-triage-env
version: "1.0.0"
description: >
  An OpenEnv environment where an AI agent triages a simulated inbox.
  The agent must classify emails by priority, detect spam, and draft replies.

tasks:
  - id: priority_classification
    description: Classify each email as HIGH, MEDIUM, or LOW priority
    grader: tasks/priority_grader.py

  - id: spam_detection
    description: Identify which emails in the inbox are spam (true/false per email)
    grader: tasks/spam_grader.py

  - id: reply_drafting
    description: Draft a professional reply for high-priority emails
    grader: tasks/reply_grader.py

endpoints:
  reset: /reset
  step: /step
  state: /state

env_vars:
  - API_BASE_URL
  - MODEL_NAME
  - HF_TOKEN