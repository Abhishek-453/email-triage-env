name: email-triage-env
version: "1.0.0"
description: An OpenEnv environment for email triage.

tasks:
  - id: priority_classification
    description: Classify each email as HIGH, MEDIUM, or LOW priority
    grader: tasks/priority_grader.py

  - id: spam_detection
    description: Identify which emails are spam
    grader: tasks/spam_grader.py

  - id: reply_drafting
    description: Draft a professional reply for emails
    grader: tasks/reply_grader.py

endpoints:
  reset: /reset
  step: /step
  state: /state